name: CI

on:
  push:
    branches: [project-setup]
  pull_request:
    branches: [project-setup]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install
        run: npm ci

      # - name: Lint
      #   run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (coverage)
        run: npm run test -- --coverage

      - name: Build
        run: npm run build