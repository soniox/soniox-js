<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soniox Realtime Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { h, render } from 'https://esm.sh/preact@10.19.3';
        import { useState, useRef, useEffect, useCallback } from 'https://esm.sh/preact@10.19.3/hooks';
        import htm from 'https://esm.sh/htm@3.1.1';

        const html = htm.bind(h);

        // ====================================================================
        // Audio Utilities
        // ====================================================================
        const TARGET_SAMPLE_RATE = 16000;

        function floatTo16BitPCM(float32) {
            const buffer = new Int16Array(float32.length);
            for (let i = 0; i < float32.length; i++) {
                const sample = Math.max(-1, Math.min(1, float32[i]));
                buffer[i] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
            }
            return buffer;
        }

        function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
            if (outputSampleRate >= inputSampleRate) {
                return floatTo16BitPCM(buffer);
            }
            const ratio = inputSampleRate / outputSampleRate;
            const newLength = Math.round(buffer.length / ratio);
            const result = new Int16Array(newLength);
            let offsetResult = 0, offsetBuffer = 0;
            while (offsetResult < result.length) {
                const nextOffset = Math.round((offsetResult + 1) * ratio);
                let accum = 0, count = 0;
                for (let i = offsetBuffer; i < nextOffset && i < buffer.length; i++) {
                    accum += buffer[i];
                    count++;
                }
                const sample = Math.max(-1, Math.min(1, accum / count));
                result[offsetResult] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
                offsetResult++;
                offsetBuffer = nextOffset;
            }
            return result;
        }

        // ====================================================================
        // Shared Components
        // ====================================================================
        function Input({ label, value, onChange, placeholder, className = '' }) {
            return html`
                <label class="flex flex-col gap-1 font-semibold ${className}">
                    ${label}
                    <input
                        type="text"
                        class="px-3 py-2 text-base font-normal border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        value=${value}
                        onInput=${(e) => onChange(e.target.value)}
                        placeholder=${placeholder}
                    />
                </label>
            `;
        }

        function Select({ label, value, onChange, options, className = '' }) {
            return html`
                <label class="flex flex-col gap-1 font-semibold ${className}">
                    ${label}
                    <select
                        class="px-3 py-2 text-base font-normal border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        value=${value}
                        onChange=${(e) => onChange(e.target.value)}
                    >
                        ${options.map(opt => html`<option value=${opt.value}>${opt.label}</option>`)}
                    </select>
                </label>
            `;
        }

        function Checkbox({ label, checked, onChange }) {
            return html`
                <label class="flex items-center gap-2 font-semibold cursor-pointer">
                    <input
                        type="checkbox"
                        class="w-4 h-4"
                        checked=${checked}
                        onChange=${(e) => onChange(e.target.checked)}
                    />
                    <span>${label}</span>
                </label>
            `;
        }

        function Button({ children, onClick, disabled, variant = 'primary' }) {
            const base = 'px-4 py-2 text-base font-semibold rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed';
            const variants = {
                primary: 'bg-blue-600 text-white hover:bg-blue-700',
                secondary: 'bg-gray-200 text-gray-800 hover:bg-gray-300',
            };
            return html`
                <button class="${base} ${variants[variant]}" onClick=${onClick} disabled=${disabled}>
                    ${children}
                </button>
            `;
        }

        function Panel({ title, children }) {
            return html`
                <div class="mt-4 p-4 border border-gray-300 rounded-lg">
                    ${title && html`<div class="text-sm text-gray-500 mb-2">${title}</div>`}
                    ${children}
                </div>
            `;
        }

        function formatTime(ms) {
            return ms === undefined ? '?' : (ms / 1000).toFixed(2) + 's';
        }

        // ====================================================================
        // Transcription Tab
        // ====================================================================
        function TranscriptionTab() {
            const [model, setModel] = useState('stt-rt-v3');
            const [language, setLanguage] = useState('');
            const [segmentMode, setSegmentMode] = useState('raw');
            const [groupBy, setGroupBy] = useState('speaker,language');
            const [endpoint, setEndpoint] = useState(true);
            const [diarization, setDiarization] = useState(false);
            const [status, setStatus] = useState('idle');
            const [partial, setPartial] = useState('');
            const [segments, setSegments] = useState([]);
            const [logs, setLogs] = useState([]);

            const wsRef = useRef(null);
            const audioRef = useRef({ ctx: null, stream: null, processor: null, source: null, gain: null });
            const modeRef = useRef('raw');

            const log = useCallback((msg) => {
                setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 99)]);
            }, []);

            const flushPartial = useCallback(() => {
                setPartial(prev => {
                    if (prev.trim() && modeRef.current === 'raw') {
                        setSegments(segs => [...segs, { text: prev, isRaw: true }]);
                    }
                    return '';
                });
            }, []);

            const handleMessage = useCallback((data) => {
                const msg = JSON.parse(data);
                if (msg.type === 'result') {
                    const result = msg.result || {};
                    const text = (result.tokens || []).map(t => t.text).join('');
                    if (text) setPartial(text);
                    if (modeRef.current !== 'raw' && msg.segments?.length) {
                        setSegments(prev => [...prev, ...msg.segments]);
                        msg.segments.forEach(s => log(`Segment: "${s.text.substring(0, 30)}..." (speaker=${s.speaker || '-'})`));
                    }
                    if (result.finished) {
                        flushPartial();
                        log('Session finished');
                    }
                } else if (msg.type === 'endpoint') {
                    flushPartial();
                    log('Endpoint detected');
                } else if (msg.type === 'error') {
                    log(`Error: ${msg.error?.message || 'unknown'}`);
                } else if (msg.type === 'connected') {
                    log(`Connected - mode: ${msg.segmentMode || 'raw'}, groupBy: ${msg.groupBy?.join(',') || 'none'}`);
                }
            }, [log, flushPartial]);

            const start = useCallback(async () => {
                setPartial('');
                setSegments([]);
                setLogs([]);
                modeRef.current = segmentMode;
                setStatus('connecting');

                const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
                const url = new URL(`${protocol}://${location.host}/realtime`);
                url.searchParams.set('model', model.trim() || 'stt-rt-v3');
                if (language.trim()) url.searchParams.set('language', language.trim());
                url.searchParams.set('endpoint', endpoint ? 'true' : 'false');
                url.searchParams.set('diarization', diarization ? 'true' : 'false');
                url.searchParams.set('languageId', 'true');
                url.searchParams.set('segmentMode', segmentMode);
                url.searchParams.set('groupBy', groupBy);

                const ws = new WebSocket(url.toString());
                ws.binaryType = 'arraybuffer';
                wsRef.current = ws;

                ws.onopen = () => { setStatus('connected'); log('WebSocket connected'); };
                ws.onmessage = (e) => { try { handleMessage(e.data); } catch { log('Non-JSON message'); } };
                ws.onclose = (e) => { setStatus(`closed (${e.code})`); log(`WebSocket closed: ${e.reason || 'no reason'}`); };
                ws.onerror = () => { setStatus('error'); log('WebSocket error'); };

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = ctx.createMediaStreamSource(stream);
                    const processor = ctx.createScriptProcessor(4096, 1, 1);
                    const gain = ctx.createGain();
                    gain.gain.value = 0;

                    processor.onaudioprocess = (e) => {
                        if (wsRef.current?.readyState === WebSocket.OPEN) {
                            const pcm = downsampleBuffer(e.inputBuffer.getChannelData(0), ctx.sampleRate, TARGET_SAMPLE_RATE);
                            if (pcm.length > 0) wsRef.current.send(pcm.buffer);
                        }
                    };

                    source.connect(processor);
                    processor.connect(gain);
                    gain.connect(ctx.destination);

                    audioRef.current = { ctx, stream, processor, source, gain };
                } catch {
                    setStatus('mic error');
                    log('Microphone permission denied');
                    stop();
                }
            }, [model, language, segmentMode, groupBy, endpoint, diarization, log, handleMessage]);

            const stop = useCallback(() => {
                if (wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify({ type: 'finish' }));
                    wsRef.current.close(1000, 'client stopped');
                }
                wsRef.current = null;
                const { ctx, stream, processor, source, gain } = audioRef.current;
                processor?.disconnect();
                source?.disconnect();
                gain?.disconnect();
                ctx?.close();
                stream?.getTracks().forEach(t => t.stop());
                audioRef.current = { ctx: null, stream: null, processor: null, source: null, gain: null };
                setStatus('idle');
            }, []);

            const isRunning = status !== 'idle' && status !== 'error' && !status.startsWith('closed');

            return html`
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 mt-6 items-end">
                    <${Input} label="Model" value=${model} onChange=${setModel} />
                    <${Input} label="Language hint" value=${language} onChange=${setLanguage} placeholder="en" />
                    <${Select} label="Segment Mode" value=${segmentMode} onChange=${setSegmentMode} options=${[
                        { value: 'raw', label: 'Raw tokens' },
                        { value: 'segments', label: 'Segments (stateless)' },
                        { value: 'buffer', label: 'Buffer (rolling)' },
                    ]} />
                    <${Select} label="Group By" value=${groupBy} onChange=${setGroupBy} options=${[
                        { value: 'speaker,language', label: 'Speaker + Language' },
                        { value: 'speaker', label: 'Speaker only' },
                        { value: 'language', label: 'Language only' },
                        { value: '', label: 'No grouping' },
                    ]} />
                    <${Checkbox} label="Endpoint" checked=${endpoint} onChange=${setEndpoint} />
                    <${Checkbox} label="Diarization" checked=${diarization} onChange=${setDiarization} />
                </div>

                <div class="flex gap-3 mt-4">
                    <${Button} onClick=${start} disabled=${isRunning}>Start<//>
                    <${Button} onClick=${stop} disabled=${!isRunning} variant="secondary">Stop<//>
                </div>

                <div class="mt-4 font-semibold">Status: <span class="text-blue-600">${status}</span></div>

                <${Panel} title="Live partial">
                    <pre class="whitespace-pre-wrap break-words font-mono text-blue-600">${partial}</pre>
                <//>

                <${Panel} title="Final transcript / Segments">
                    <div class="space-y-2">
                        ${segments.map((seg, i) => seg.isRaw
                            ? html`<pre key=${i} class="whitespace-pre-wrap break-words font-mono">${seg.text}</pre>`
                            : html`
                                <div key=${i} class="p-2 bg-gray-100 rounded">
                                    <div class="text-xs text-gray-500 mb-1">
                                        ${[
                                            seg.speaker && `Speaker: ${seg.speaker}`,
                                            seg.language && `Lang: ${seg.language}`,
                                            (seg.start_ms !== undefined || seg.end_ms !== undefined) && `${formatTime(seg.start_ms)} - ${formatTime(seg.end_ms)}`
                                        ].filter(Boolean).join(' | ') || 'No metadata'}
                                    </div>
                                    <div>${seg.text}</div>
                                </div>
                            `
                        )}
                    </div>
                <//>

                <${Panel} title="Log">
                    <pre class="whitespace-pre-wrap break-words font-mono text-sm max-h-48 overflow-y-auto">${logs.join('\n')}</pre>
                <//>
            `;
        }

        // ====================================================================
        // Agent Tab
        // ====================================================================
        function AgentTab() {
            const [model, setModel] = useState('stt-rt-v3');
            const [language, setLanguage] = useState('');
            const [agentState, setAgentState] = useState('idle');
            const [sttActive, setSttActive] = useState(false);
            const [partial, setPartial] = useState('');
            const [messages, setMessages] = useState([]);
            const [logs, setLogs] = useState([]);
            const [streamingContent, setStreamingContent] = useState('');

            const wsRef = useRef(null);
            const audioRef = useRef({ ctx: null, stream: null, processor: null, source: null, gain: null });
            const chatRef = useRef(null);

            const log = useCallback((msg) => {
                setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 99)]);
            }, []);

            const handleMessage = useCallback((data) => {
                const msg = JSON.parse(data);
                switch (msg.type) {
                    case 'state':
                        setAgentState(msg.state);
                        log(`State: ${msg.state}`);
                        break;
                    case 'stt_paused':
                        setSttActive(false);
                        log('STT paused');
                        break;
                    case 'stt_resumed':
                        setSttActive(true);
                        log('STT resumed');
                        break;
                    case 'partial':
                        setPartial(msg.text);
                        break;
                    case 'user_message':
                        setPartial('');
                        setMessages(prev => [...prev, { role: 'user', content: msg.text }]);
                        log(`User: "${msg.text.substring(0, 50)}..."`);
                        break;
                    case 'assistant_chunk':
                        setStreamingContent(prev => prev + msg.text);
                        break;
                    case 'assistant_done':
                        setMessages(prev => [...prev, { role: 'assistant', content: msg.text }]);
                        setStreamingContent('');
                        log(`Assistant: "${msg.text.substring(0, 50)}..."`);
                        break;
                    case 'connected':
                        log(`Connected - STT: ${msg.config?.sttModel}`);
                        break;
                    case 'history_cleared':
                        setMessages([]);
                        log('Conversation history cleared');
                        break;
                    case 'error':
                        log(`Error: ${msg.error?.message || 'unknown'}`);
                        break;
                    case 'disconnected':
                        log(`Disconnected: ${msg.reason || 'unknown'}`);
                        break;
                }
            }, [log]);

            useEffect(() => {
                if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [messages, streamingContent]);

            const start = useCallback(async () => {
                setPartial('');
                setLogs([]);
                setStreamingContent('');
                setAgentState('connecting');
                setSttActive(false);

                const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
                const url = new URL(`${protocol}://${location.host}/agent`);
                url.searchParams.set('model', model.trim() || 'stt-rt-v3');
                if (language.trim()) url.searchParams.set('language', language.trim());

                const ws = new WebSocket(url.toString());
                ws.binaryType = 'arraybuffer';
                wsRef.current = ws;

                ws.onopen = () => log('WebSocket connected');
                ws.onmessage = (e) => { try { handleMessage(e.data); } catch { log('Non-JSON message'); } };
                ws.onclose = (e) => {
                    setAgentState('idle');
                    setSttActive(false);
                    log(`WebSocket closed: ${e.reason || e.code}`);
                    stop(true);
                };
                ws.onerror = () => log('WebSocket error');

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = ctx.createMediaStreamSource(stream);
                    const processor = ctx.createScriptProcessor(4096, 1, 1);
                    const gain = ctx.createGain();
                    gain.gain.value = 0;

                    processor.onaudioprocess = (e) => {
                        if (wsRef.current?.readyState === WebSocket.OPEN) {
                            const pcm = downsampleBuffer(e.inputBuffer.getChannelData(0), ctx.sampleRate, TARGET_SAMPLE_RATE);
                            if (pcm.length > 0) wsRef.current.send(pcm.buffer);
                        }
                    };

                    source.connect(processor);
                    processor.connect(gain);
                    gain.connect(ctx.destination);

                    audioRef.current = { ctx, stream, processor, source, gain };
                } catch {
                    log('Microphone permission denied');
                    stop();
                }
            }, [model, language, log, handleMessage]);

            const stop = useCallback((skipWsClose = false) => {
                if (!skipWsClose && wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify({ type: 'finish' }));
                    wsRef.current.close(1000, 'client stopped');
                }
                wsRef.current = null;
                const { ctx, stream, processor, source, gain } = audioRef.current;
                processor?.disconnect();
                source?.disconnect();
                gain?.disconnect();
                ctx?.close();
                stream?.getTracks().forEach(t => t.stop());
                audioRef.current = { ctx: null, stream: null, processor: null, source: null, gain: null };
                setAgentState('idle');
                setSttActive(false);
            }, []);

            const clearHistory = useCallback(() => {
                if (wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify({ type: 'clear_history' }));
                }
            }, []);

            const isRunning = agentState !== 'idle';

            return html`
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-6 items-end">
                    <${Input} label="STT Model" value=${model} onChange=${setModel} />
                    <${Input} label="Language" value=${language} onChange=${setLanguage} placeholder="en" />
                    <${Button} onClick=${start} disabled=${isRunning}>Start Agent<//>
                    <div class="flex gap-2">
                        <${Button} onClick=${() => stop()} disabled=${!isRunning} variant="secondary">Stop<//>
                        <${Button} onClick=${clearHistory} disabled=${!isRunning} variant="secondary">Clear<//>
                    </div>
                </div>

                <p class="text-sm text-gray-500 mt-2">
                    This demo uses a simulated agent that echoes your speech. Replace the backend logic with your own LLM/agent.
                </p>

                <div class="flex gap-8 items-center p-4 bg-gray-50 rounded-lg mt-4">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full ${agentState === 'listening' ? 'bg-green-500 animate-pulse' : agentState !== 'idle' ? 'bg-amber-500' : 'bg-gray-400'}"></span>
                        <span>State: <strong>${agentState}</strong></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full ${sttActive ? 'bg-green-500 animate-pulse' : 'bg-amber-500'}"></span>
                        <span>STT: <strong>${sttActive ? 'active' : 'paused'}</strong></span>
                    </div>
                </div>

                <${Panel} title="You are saying...">
                    <div class="min-h-8 p-2 bg-blue-50 rounded text-blue-600">${partial}</div>
                <//>

                <div ref=${chatRef} class="max-h-96 overflow-y-auto p-4 border border-gray-300 rounded-lg mt-4 space-y-3">
                    ${messages.map((msg, i) => html`
                        <div key=${i} class="p-3 rounded-lg max-w-[85%] ${msg.role === 'user' ? 'bg-blue-600 text-white ml-auto' : 'bg-gray-100 mr-auto'}">
                            <div class="text-xs font-semibold mb-1 ${msg.role === 'user' ? 'text-blue-200' : 'text-gray-500'}">
                                ${msg.role === 'user' ? 'You' : 'Assistant'}
                            </div>
                            <div class="whitespace-pre-wrap">${msg.content}</div>
                        </div>
                    `)}
                    ${streamingContent && html`
                        <div class="p-3 rounded-lg max-w-[85%] bg-gray-100 mr-auto">
                            <div class="text-xs font-semibold mb-1 text-gray-500">Assistant</div>
                            <div class="whitespace-pre-wrap">${streamingContent}<span class="animate-pulse">▊</span></div>
                        </div>
                    `}
                </div>

                <${Panel} title="Event Log">
                    <pre class="whitespace-pre-wrap break-words font-mono text-sm max-h-48 overflow-y-auto">${logs.join('\n')}</pre>
                <//>
            `;
        }

        // ====================================================================
        // Main App
        // ====================================================================
        function App() {
            const [activeTab, setActiveTab] = useState('transcription');

            return html`
                <div class="max-w-4xl mx-auto p-6">
                    <h1 class="text-3xl font-bold">Soniox Realtime Demo</h1>
                    <p class="text-gray-500 mt-1">Stream microphone audio to the Express server with Soniox realtime STT.</p>

                    <div class="flex mt-6 border-b-2 border-gray-300">
                        <button
                            class="px-6 py-3 font-semibold -mb-0.5 border-b-2 transition-colors ${activeTab === 'transcription' ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent hover:text-gray-700'}"
                            onClick=${() => setActiveTab('transcription')}
                        >
                            Transcription
                        </button>
                        <button
                            class="px-6 py-3 font-semibold -mb-0.5 border-b-2 transition-colors ${activeTab === 'agent' ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent hover:text-gray-700'}"
                            onClick=${() => setActiveTab('agent')}
                        >
                            Voice Agent
                        </button>
                    </div>

                    ${activeTab === 'transcription' ? html`<${TranscriptionTab} />` : html`<${AgentTab} />`}
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('app'));
    </script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div id="app"></div>
</body>
</html>
