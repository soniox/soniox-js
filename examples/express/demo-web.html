<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soniox SDK Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { h, render } from 'https://esm.sh/preact@10.19.3';
        import { useState, useRef, useEffect, useCallback } from 'https://esm.sh/preact@10.19.3/hooks';
        import htm from 'https://esm.sh/htm@3.1.1';

        const html = htm.bind(h);

        // ====================================================================
        // Audio Utilities
        // ====================================================================
        const TARGET_SAMPLE_RATE = 16000;

        function floatTo16BitPCM(float32) {
            const buffer = new Int16Array(float32.length);
            for (let i = 0; i < float32.length; i++) {
                const sample = Math.max(-1, Math.min(1, float32[i]));
                buffer[i] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
            }
            return buffer;
        }

        function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
            if (outputSampleRate >= inputSampleRate) {
                return floatTo16BitPCM(buffer);
            }
            const ratio = inputSampleRate / outputSampleRate;
            const newLength = Math.round(buffer.length / ratio);
            const result = new Int16Array(newLength);
            let offsetResult = 0, offsetBuffer = 0;
            while (offsetResult < result.length) {
                const nextOffset = Math.round((offsetResult + 1) * ratio);
                let accum = 0, count = 0;
                for (let i = offsetBuffer; i < nextOffset && i < buffer.length; i++) {
                    accum += buffer[i];
                    count++;
                }
                const sample = Math.max(-1, Math.min(1, accum / count));
                result[offsetResult] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
                offsetResult++;
                offsetBuffer = nextOffset;
            }
            return result;
        }

        // ====================================================================
        // Shared Components
        // ====================================================================
        function Input({ label, value, onChange, placeholder, className = '' }) {
            return html`
                <label class="flex flex-col gap-1 font-semibold ${className}">
                    ${label}
                    <input
                        type="text"
                        class="px-3 py-2 text-base font-normal border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        value=${value}
                        onInput=${(e) => onChange(e.target.value)}
                        placeholder=${placeholder}
                    />
                </label>
            `;
        }

        function Select({ label, value, onChange, options, className = '' }) {
            return html`
                <label class="flex flex-col gap-1 font-semibold ${className}">
                    ${label}
                    <select
                        class="px-3 py-2 text-base font-normal border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        value=${value}
                        onChange=${(e) => onChange(e.target.value)}
                    >
                        ${options.map(opt => html`<option value=${opt.value}>${opt.label}</option>`)}
                    </select>
                </label>
            `;
        }

        function Checkbox({ label, checked, onChange }) {
            return html`
                <label class="flex items-center gap-2 font-semibold cursor-pointer">
                    <input
                        type="checkbox"
                        class="w-4 h-4"
                        checked=${checked}
                        onChange=${(e) => onChange(e.target.checked)}
                    />
                    <span>${label}</span>
                </label>
            `;
        }

        function Button({ children, onClick, disabled, variant = 'primary' }) {
            const base = 'px-4 py-2 text-base font-semibold rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed';
            const variants = {
                primary: 'bg-blue-600 text-white hover:bg-blue-700',
                secondary: 'bg-gray-200 text-gray-800 hover:bg-gray-300',
            };
            return html`
                <button class="${base} ${variants[variant]}" onClick=${onClick} disabled=${disabled}>
                    ${children}
                </button>
            `;
        }

        function Panel({ title, children }) {
            return html`
                <div class="mt-4 p-4 border border-gray-300 rounded-lg">
                    ${title && html`<div class="text-sm text-gray-500 mb-2">${title}</div>`}
                    ${children}
                </div>
            `;
        }

        function formatTime(ms) {
            return ms === undefined ? '?' : (ms / 1000).toFixed(2) + 's';
        }

        // ====================================================================
        // Transcription Tab
        // ====================================================================
        function TranscriptionTab() {
            const [model, setModel] = useState('stt-rt-v3');
            const [language, setLanguage] = useState('');
            const [segmentMode, setSegmentMode] = useState('raw');
            const [groupBy, setGroupBy] = useState('speaker,language');
            const [endpoint, setEndpoint] = useState(true);
            const [diarization, setDiarization] = useState(false);
            const [status, setStatus] = useState('idle');
            const [partial, setPartial] = useState('');
            const [segments, setSegments] = useState([]);
            const [logs, setLogs] = useState([]);

            const wsRef = useRef(null);
            const audioRef = useRef({ ctx: null, stream: null, processor: null, source: null, gain: null });
            const modeRef = useRef('raw');
            const segmentsRef = useRef(null);

            useEffect(() => {
                if (segmentsRef.current) segmentsRef.current.scrollTop = segmentsRef.current.scrollHeight;
            }, [segments]);

            const log = useCallback((msg) => {
                setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 99)]);
            }, []);

            const flushPartial = useCallback(() => {
                setPartial(prev => {
                    if (prev.trim() && modeRef.current === 'raw') {
                        setSegments(segs => [...segs, { text: prev, isRaw: true }]);
                    }
                    return '';
                });
            }, []);

            const handleMessage = useCallback((data) => {
                const msg = JSON.parse(data);
                if (msg.type === 'result') {
                    const result = msg.result || {};
                    const text = (result.tokens || []).map(t => t.text).join('');
                    if (text) setPartial(text);
                    if (modeRef.current !== 'raw' && msg.segments?.length) {
                        setSegments(prev => [...prev, ...msg.segments]);
                        msg.segments.forEach(s => log(`Segment: "${s.text.substring(0, 30)}..." (speaker=${s.speaker || '-'})`));
                    }
                    if (result.finished) {
                        flushPartial();
                        log('Session finished');
                    }
                } else if (msg.type === 'endpoint') {
                    flushPartial();
                    log('Endpoint detected');
                } else if (msg.type === 'error') {
                    log(`Error: ${msg.error?.message || 'unknown'}`);
                } else if (msg.type === 'connected') {
                    log(`Connected - mode: ${msg.segmentMode || 'raw'}, groupBy: ${msg.groupBy?.join(',') || 'none'}`);
                }
            }, [log, flushPartial]);

            const start = useCallback(async () => {
                setPartial('');
                setSegments([]);
                setLogs([]);
                modeRef.current = segmentMode;
                setStatus('connecting');

                const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
                const url = new URL(`${protocol}://${location.host}/realtime`);
                url.searchParams.set('model', model.trim() || 'stt-rt-v3');
                if (language.trim()) url.searchParams.set('language', language.trim());
                url.searchParams.set('endpoint', endpoint ? 'true' : 'false');
                url.searchParams.set('diarization', diarization ? 'true' : 'false');
                url.searchParams.set('languageId', 'true');
                url.searchParams.set('segmentMode', segmentMode);
                url.searchParams.set('groupBy', groupBy);

                const ws = new WebSocket(url.toString());
                ws.binaryType = 'arraybuffer';
                wsRef.current = ws;

                ws.onopen = () => { setStatus('connected'); log('WebSocket connected'); };
                ws.onmessage = (e) => { try { handleMessage(e.data); } catch { log('Non-JSON message'); } };
                ws.onclose = (e) => { setStatus(`closed (${e.code})`); log(`WebSocket closed: ${e.reason || 'no reason'}`); };
                ws.onerror = () => { setStatus('error'); log('WebSocket error'); };

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = ctx.createMediaStreamSource(stream);
                    const processor = ctx.createScriptProcessor(4096, 1, 1);
                    const gain = ctx.createGain();
                    gain.gain.value = 0;

                    processor.onaudioprocess = (e) => {
                        if (wsRef.current?.readyState === WebSocket.OPEN) {
                            const pcm = downsampleBuffer(e.inputBuffer.getChannelData(0), ctx.sampleRate, TARGET_SAMPLE_RATE);
                            if (pcm.length > 0) wsRef.current.send(pcm.buffer);
                        }
                    };

                    source.connect(processor);
                    processor.connect(gain);
                    gain.connect(ctx.destination);

                    audioRef.current = { ctx, stream, processor, source, gain };
                } catch {
                    setStatus('mic error');
                    log('Microphone permission denied');
                    stop();
                }
            }, [model, language, segmentMode, groupBy, endpoint, diarization, log, handleMessage]);

            const stop = useCallback(() => {
                if (wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify({ type: 'finish' }));
                    wsRef.current.close(1000, 'client stopped');
                }
                wsRef.current = null;
                const { ctx, stream, processor, source, gain } = audioRef.current;
                processor?.disconnect();
                source?.disconnect();
                gain?.disconnect();
                ctx?.close();
                stream?.getTracks().forEach(t => t.stop());
                audioRef.current = { ctx: null, stream: null, processor: null, source: null, gain: null };
                setStatus('idle');
            }, []);

            const isRunning = status !== 'idle' && status !== 'error' && !status.startsWith('closed');

            return html`
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 mt-6 items-end">
                    <${Input} label="Model" value=${model} onChange=${setModel} />
                    <${Input} label="Language hint" value=${language} onChange=${setLanguage} placeholder="en" />
                    <${Select} label="Segment Mode" value=${segmentMode} onChange=${setSegmentMode} options=${[
                        { value: 'raw', label: 'Raw tokens' },
                        { value: 'segments', label: 'Segments (stateless)' },
                        { value: 'buffer', label: 'Buffer (rolling)' },
                    ]} />
                    <${Select} label="Group By" value=${groupBy} onChange=${setGroupBy} options=${[
                        { value: 'speaker,language', label: 'Speaker + Language' },
                        { value: 'speaker', label: 'Speaker only' },
                        { value: 'language', label: 'Language only' },
                        { value: '', label: 'No grouping' },
                    ]} />
                    <${Checkbox} label="Endpoint" checked=${endpoint} onChange=${setEndpoint} />
                    <${Checkbox} label="Diarization" checked=${diarization} onChange=${setDiarization} />
                </div>

                <div class="flex gap-3 mt-4">
                    <${Button} onClick=${start} disabled=${isRunning}>Start<//>
                    <${Button} onClick=${stop} disabled=${!isRunning} variant="secondary">Stop<//>
                </div>

                <div class="mt-4 font-semibold">Status: <span class="text-blue-600">${status}</span></div>

                <${Panel} title="Live partial">
                    <pre class="whitespace-pre-wrap break-words font-mono text-blue-600">${partial}</pre>
                <//>

                <${Panel} title="Final transcript / Segments">
                    <div ref=${segmentsRef} class="space-y-2 max-h-64 overflow-y-auto">
                        ${segments.map((seg, i) => seg.isRaw
                            ? html`<pre key=${i} class="whitespace-pre-wrap break-words font-mono">${seg.text}</pre>`
                            : html`
                                <div key=${i} class="p-2 bg-gray-100 rounded">
                                    <div class="text-xs text-gray-500 mb-1">
                                        ${[
                                            seg.speaker && `Speaker: ${seg.speaker}`,
                                            seg.language && `Lang: ${seg.language}`,
                                            (seg.start_ms !== undefined || seg.end_ms !== undefined) && `${formatTime(seg.start_ms)} - ${formatTime(seg.end_ms)}`
                                        ].filter(Boolean).join(' | ') || 'No metadata'}
                                    </div>
                                    <div>${seg.text}</div>
                                </div>
                            `
                        )}
                    </div>
                <//>

                <${Panel} title="Log">
                    <pre class="whitespace-pre-wrap break-words font-mono text-sm max-h-48 overflow-y-auto">${logs.join('\n')}</pre>
                <//>
            `;
        }

        // ====================================================================
        // Agent Tab
        // ====================================================================
        function AgentTab() {
            const [model, setModel] = useState('stt-rt-v3');
            const [language, setLanguage] = useState('');
            const [mode, setMode] = useState('auto'); // 'auto' or 'ptt' (push-to-talk)
            const [agentState, setAgentState] = useState('idle');
            const [sttActive, setSttActive] = useState(false);
            const [recording, setRecording] = useState(false); // PTT recording state
            const [finalizing, setFinalizing] = useState(false); // PTT finalizing state
            const [partial, setPartial] = useState('');
            const [messages, setMessages] = useState([]);
            const [logs, setLogs] = useState([]);
            const [streamingContent, setStreamingContent] = useState('');

            const wsRef = useRef(null);
            const audioRef = useRef({ ctx: null, stream: null, processor: null, source: null, gain: null });
            const chatRef = useRef(null);
            const modeRef = useRef('auto');

            const log = useCallback((msg) => {
                setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 99)]);
            }, []);

            const handleMessage = useCallback((data) => {
                const msg = JSON.parse(data);
                switch (msg.type) {
                    // Auto mode (agent) messages
                    case 'state':
                        setAgentState(msg.state);
                        log(`State: ${msg.state}`);
                        break;
                    case 'stt_paused':
                        setSttActive(false);
                        log('STT paused');
                        break;
                    case 'stt_resumed':
                        setSttActive(true);
                        log('STT resumed');
                        break;
                    case 'partial':
                        setPartial(msg.text);
                        break;
                    case 'user_message':
                        setPartial('');
                        setMessages(prev => [...prev, { role: 'user', content: msg.text }]);
                        log(`User: "${msg.text.substring(0, 50)}..."`);
                        break;
                    case 'assistant_chunk':
                        setStreamingContent(prev => prev + msg.text);
                        break;
                    case 'assistant_done':
                        setMessages(prev => [...prev, { role: 'assistant', content: msg.text }]);
                        setStreamingContent('');
                        log(`Assistant: "${msg.text.substring(0, 50)}..."`);
                        break;
                    case 'connected':
                        log(`Connected - mode: ${modeRef.current}, model: ${msg.config?.sttModel || msg.config?.model}`);
                        break;
                    case 'history_cleared':
                        setMessages([]);
                        log('Conversation history cleared');
                        break;
                    // PTT mode messages
                    case 'recording':
                        setRecording(msg.active);
                        if (msg.active) setFinalizing(false);
                        log(`Recording: ${msg.active ? 'started' : 'stopped'}`);
                        break;
                    case 'finalizing':
                        setFinalizing(true);
                        log('Finalizing...');
                        break;
                    case 'utterance':
                        setPartial('');
                        setFinalizing(false);
                        if (msg.text) {
                            setMessages(prev => [...prev, { role: 'user', content: msg.text }]);
                            log(`Utterance: "${msg.text.substring(0, 50)}${msg.text.length > 50 ? '...' : ''}"`);
                        } else {
                            log('Utterance: (empty)');
                        }
                        break;
                    // Common messages
                    case 'error':
                        log(`Error: ${msg.error?.message || 'unknown'}`);
                        break;
                    case 'disconnected':
                        log(`Disconnected: ${msg.reason || 'unknown'}`);
                        break;
                }
            }, [log]);

            useEffect(() => {
                if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [messages, streamingContent]);

            const start = useCallback(async () => {
                setPartial('');
                setLogs([]);
                setStreamingContent('');
                setAgentState('connecting');
                setSttActive(false);
                setRecording(false);
                setFinalizing(false);
                modeRef.current = mode;

                const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
                // Use different endpoint based on mode
                const endpoint = mode === 'ptt' ? '/push-to-talk' : '/agent';
                const url = new URL(`${protocol}://${location.host}${endpoint}`);
                url.searchParams.set('model', model.trim() || 'stt-rt-v3');
                if (language.trim()) url.searchParams.set('language', language.trim());

                const ws = new WebSocket(url.toString());
                ws.binaryType = 'arraybuffer';
                wsRef.current = ws;

                ws.onopen = () => log('WebSocket connected');
                ws.onmessage = (e) => { try { handleMessage(e.data); } catch { log('Non-JSON message'); } };
                ws.onclose = (e) => {
                    setAgentState('idle');
                    setSttActive(false);
                    setRecording(false);
                    log(`WebSocket closed: ${e.reason || e.code}`);
                    stop(true);
                };
                ws.onerror = () => log('WebSocket error');

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = ctx.createMediaStreamSource(stream);
                    const processor = ctx.createScriptProcessor(4096, 1, 1);
                    const gain = ctx.createGain();
                    gain.gain.value = 0;

                    processor.onaudioprocess = (e) => {
                        if (wsRef.current?.readyState === WebSocket.OPEN) {
                            const pcm = downsampleBuffer(e.inputBuffer.getChannelData(0), ctx.sampleRate, TARGET_SAMPLE_RATE);
                            if (pcm.length > 0) wsRef.current.send(pcm.buffer);
                        }
                    };

                    source.connect(processor);
                    processor.connect(gain);
                    gain.connect(ctx.destination);

                    audioRef.current = { ctx, stream, processor, source, gain };

                    // For PTT mode, set state to ready after connection
                    if (mode === 'ptt') {
                        setAgentState('ready');
                    }
                } catch {
                    log('Microphone permission denied');
                    stop();
                }
            }, [model, language, mode, log, handleMessage]);

            const stop = useCallback((skipWsClose = false) => {
                if (!skipWsClose && wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify({ type: 'finish' }));
                    wsRef.current.close(1000, 'client stopped');
                }
                wsRef.current = null;
                const { ctx, stream, processor, source, gain } = audioRef.current;
                processor?.disconnect();
                source?.disconnect();
                gain?.disconnect();
                ctx?.close();
                stream?.getTracks().forEach(t => t.stop());
                audioRef.current = { ctx: null, stream: null, processor: null, source: null, gain: null };
                setAgentState('idle');
                setSttActive(false);
                setRecording(false);
                setFinalizing(false);
            }, []);

            const clearHistory = useCallback(() => {
                if (wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify({ type: 'clear_history' }));
                }
                setMessages([]);
            }, []);

            // PTT handlers
            const startRecording = useCallback(() => {
                if (wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify({ type: 'start' }));
                }
            }, []);

            const stopRecording = useCallback(() => {
                if (wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify({ type: 'stop' }));
                }
            }, []);

            const isRunning = agentState !== 'idle';
            const isPTT = modeRef.current === 'ptt';

            return html`
                <div class="grid grid-cols-2 sm:grid-cols-5 gap-4 mt-6 items-end">
                    <${Input} label="STT Model" value=${model} onChange=${setModel} />
                    <${Input} label="Language" value=${language} onChange=${setLanguage} placeholder="en" />
                    <${Select} label="Mode" value=${mode} onChange=${setMode} options=${[
                        { value: 'auto', label: 'Auto endpoint' },
                        { value: 'ptt', label: 'Push-to-talk' },
                    ]} />
                    <${Button} onClick=${start} disabled=${isRunning}>Start<//>
                    <div class="flex gap-2">
                        <${Button} onClick=${() => stop()} disabled=${!isRunning} variant="secondary">Stop<//>
                        <${Button} onClick=${clearHistory} variant="secondary">Clear<//>
                    </div>
                </div>

                <p class="text-sm text-gray-500 mt-2">
                    ${mode === 'auto'
                        ? 'Auto mode: Server detects when you stop speaking (uses RealtimeUtteranceBuffer with server endpoint events).'
                        : 'Push-to-talk: Hold the button to speak, release to send (uses RealtimeUtteranceBuffer with manual endpoint control).'}
                </p>

                <div class="flex gap-8 items-center p-4 bg-gray-50 rounded-lg mt-4">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full ${
                            agentState === 'listening' || agentState === 'ready' ? 'bg-green-500' :
                            agentState !== 'idle' ? 'bg-amber-500 animate-pulse' : 'bg-gray-400'
                        }"></span>
                        <span>State: <strong>${agentState}</strong></span>
                    </div>
                    ${!isPTT && html`
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full ${sttActive ? 'bg-green-500 animate-pulse' : 'bg-amber-500'}"></span>
                            <span>STT: <strong>${sttActive ? 'active' : 'paused'}</strong></span>
                        </div>
                    `}
                    ${isPTT && html`
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full ${
                                recording ? 'bg-red-500 animate-pulse' :
                                finalizing ? 'bg-amber-500 animate-pulse' : 'bg-gray-400'
                            }"></span>
                            <span>Status: <strong>${recording ? 'recording' : finalizing ? 'finalizing...' : 'ready'}</strong></span>
                        </div>
                    `}
                </div>

                ${isPTT && isRunning && html`
                    <div class="mt-4 flex justify-center">
                        <button
                            class="px-8 py-4 text-lg font-bold rounded-full transition-all select-none ${
                                recording
                                    ? 'bg-red-500 text-white scale-110 shadow-lg'
                                    : finalizing
                                    ? 'bg-amber-500 text-white cursor-wait'
                                    : 'bg-blue-600 text-white hover:bg-blue-700'
                            }"
                            onMouseDown=${startRecording}
                            onMouseUp=${stopRecording}
                            onMouseLeave=${() => recording && stopRecording()}
                            onTouchStart=${(e) => { e.preventDefault(); startRecording(); }}
                            onTouchEnd=${(e) => { e.preventDefault(); stopRecording(); }}
                            disabled=${finalizing}
                        >
                            ${recording ? '🎤 Recording...' : finalizing ? '⏳ Finalizing...' : '🎤 Hold to Talk'}
                        </button>
                    </div>
                `}

                <${Panel} title="You are saying...">
                    <div class="min-h-8 p-2 bg-blue-50 rounded text-blue-600">${partial}</div>
                <//>

                <div ref=${chatRef} class="max-h-96 overflow-y-auto p-4 border border-gray-300 rounded-lg mt-4 space-y-3">
                    ${messages.length === 0 && html`
                        <div class="text-gray-400 text-center py-8">
                            ${isPTT ? 'Hold the button and speak...' : 'Start speaking...'}
                        </div>
                    `}
                    ${messages.map((msg, i) => html`
                        <div key=${i} class="p-3 rounded-lg max-w-[85%] ${msg.role === 'user' ? 'bg-blue-600 text-white ml-auto' : 'bg-gray-100 mr-auto'}">
                            <div class="text-xs font-semibold mb-1 ${msg.role === 'user' ? 'text-blue-200' : 'text-gray-500'}">
                                ${msg.role === 'user' ? 'You' : 'Assistant'}
                            </div>
                            <div class="whitespace-pre-wrap">${msg.content}</div>
                        </div>
                    `)}
                    ${streamingContent && html`
                        <div class="p-3 rounded-lg max-w-[85%] bg-gray-100 mr-auto">
                            <div class="text-xs font-semibold mb-1 text-gray-500">Assistant</div>
                            <div class="whitespace-pre-wrap">${streamingContent}<span class="animate-pulse">▊</span></div>
                        </div>
                    `}
                </div>

                <${Panel} title="Event Log">
                    <pre class="whitespace-pre-wrap break-words font-mono text-sm max-h-48 overflow-y-auto">${logs.join('\n')}</pre>
                <//>
            `;
        }

        // ====================================================================
        // Async Tab
        // ====================================================================
        function AsyncTab() {
            const [audioUrl, setAudioUrl] = useState('');
            const [selectedFile, setSelectedFile] = useState(null);
            const [diarization, setDiarization] = useState(false);
            const [languageId, setLanguageId] = useState(true);
            const [waitForCompletion, setWaitForCompletion] = useState(true);
            const [loading, setLoading] = useState(false);
            const [transcriptions, setTranscriptions] = useState([]);
            const [selectedTranscription, setSelectedTranscription] = useState(null);
            const [transcript, setTranscript] = useState(null);
            const [logs, setLogs] = useState([]);

            const fileInputRef = useRef(null);

            const log = useCallback((msg) => {
                setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 99)]);
            }, []);

            const fetchTranscriptions = useCallback(async () => {
                try {
                    const res = await fetch('/transcriptions?limit=20');
                    const data = await res.json();
                    setTranscriptions(data.transcriptions || []);
                    log(`Loaded ${data.transcriptions?.length || 0} transcriptions`);
                } catch (err) {
                    log(`Error loading transcriptions: ${err.message}`);
                }
            }, [log]);

            useEffect(() => {
                fetchTranscriptions();
            }, []);

            const transcribeFromUrl = useCallback(async () => {
                if (!audioUrl.trim()) {
                    log('Please enter an audio URL');
                    return;
                }
                setLoading(true);
                log(`Starting transcription from URL: ${audioUrl}`);
                try {
                    const res = await fetch('/transcriptions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            audio_url: audioUrl.trim(),
                            wait: waitForCompletion,
                            enable_speaker_diarization: diarization,
                            enable_language_identification: languageId,
                        }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Request failed');
                    log(`Transcription created: ${data.id} (status: ${data.status})`);
                    setSelectedTranscription(data);
                    fetchTranscriptions();
                } catch (err) {
                    log(`Error: ${err.message}`);
                } finally {
                    setLoading(false);
                }
            }, [audioUrl, waitForCompletion, diarization, languageId, log, fetchTranscriptions]);

            const transcribeFromFile = useCallback(async () => {
                if (!selectedFile) {
                    log('Please select a file');
                    return;
                }
                setLoading(true);
                log(`Uploading file: ${selectedFile.name}`);
                try {
                    // First upload the file
                    const uploadRes = await fetch('/files', {
                        method: 'POST',
                        headers: { 'X-Filename': selectedFile.name },
                        body: selectedFile,
                    });
                    const file = await uploadRes.json();
                    if (!uploadRes.ok) throw new Error(file.error || 'Upload failed');
                    log(`File uploaded: ${file.id}`);

                    // Then create transcription from file_id
                    const res = await fetch('/transcriptions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            file_id: file.id,
                            wait: waitForCompletion,
                            enable_speaker_diarization: diarization,
                            enable_language_identification: languageId,
                        }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Request failed');
                    log(`Transcription created: ${data.id} (status: ${data.status})`);
                    setSelectedTranscription(data);
                    fetchTranscriptions();
                } catch (err) {
                    log(`Error: ${err.message}`);
                } finally {
                    setLoading(false);
                }
            }, [selectedFile, waitForCompletion, diarization, languageId, log, fetchTranscriptions]);

            const viewTranscript = useCallback(async (id) => {
                log(`Loading transcript for ${id}...`);
                try {
                    const res = await fetch(`/transcriptions/${id}/transcript`);
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error || 'Not found');
                    }
                    const data = await res.json();
                    setTranscript(data);
                    log(`Transcript loaded: ${data.parsed?.length || 0} segments`);
                } catch (err) {
                    log(`Error: ${err.message}`);
                    setTranscript(null);
                }
            }, [log]);

            const waitForTranscription = useCallback(async (id) => {
                log(`Waiting for transcription ${id}...`);
                try {
                    const res = await fetch(`/transcriptions/${id}/wait`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ timeout_ms: 60000 }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Wait failed');
                    log(`Transcription ${id} status: ${data.status}`);
                    setSelectedTranscription(data);
                    fetchTranscriptions();
                    if (data.status === 'completed') {
                        viewTranscript(id);
                    }
                } catch (err) {
                    log(`Error: ${err.message}`);
                }
            }, [log, fetchTranscriptions, viewTranscript]);

            const deleteTranscription = useCallback(async (id) => {
                log(`Deleting transcription ${id}...`);
                try {
                    const res = await fetch(`/transcriptions/${id}`, { method: 'DELETE' });
                    if (!res.ok) throw new Error('Delete failed');
                    log(`Transcription ${id} deleted`);
                    if (selectedTranscription?.id === id) {
                        setSelectedTranscription(null);
                        setTranscript(null);
                    }
                    fetchTranscriptions();
                } catch (err) {
                    log(`Error: ${err.message}`);
                }
            }, [log, selectedTranscription, fetchTranscriptions]);

            const selectTranscription = useCallback(async (t) => {
                setSelectedTranscription(t);
                setTranscript(null);
                if (t.status === 'completed') {
                    viewTranscript(t.id);
                }
            }, [viewTranscript]);

            return html`
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
                    <!-- Left column: Create transcription -->
                    <div>
                        <h3 class="font-semibold text-lg mb-3">Create Transcription</h3>

                        <${Panel} title="From URL">
                            <div class="space-y-3">
                                <input
                                    type="text"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md"
                                    placeholder="https://example.com/audio.mp3"
                                    value=${audioUrl}
                                    onInput=${(e) => setAudioUrl(e.target.value)}
                                />
                                <${Button} onClick=${transcribeFromUrl} disabled=${loading || !audioUrl.trim()}>
                                    ${loading ? 'Processing...' : 'Transcribe URL'}
                                <//>
                            </div>
                        <//>

                        <${Panel} title="From File">
                            <div class="space-y-3">
                                <input
                                    ref=${fileInputRef}
                                    type="file"
                                    accept="audio/*,video/*"
                                    class="w-full"
                                    onChange=${(e) => setSelectedFile(e.target.files[0] || null)}
                                />
                                <${Button} onClick=${transcribeFromFile} disabled=${loading || !selectedFile}>
                                    ${loading ? 'Processing...' : 'Upload & Transcribe'}
                                <//>
                            </div>
                        <//>

                        <${Panel} title="Options">
                            <div class="flex flex-wrap gap-4">
                                <${Checkbox} label="Speaker Diarization" checked=${diarization} onChange=${setDiarization} />
                                <${Checkbox} label="Language ID" checked=${languageId} onChange=${setLanguageId} />
                                <${Checkbox} label="Wait for completion" checked=${waitForCompletion} onChange=${setWaitForCompletion} />
                            </div>
                        <//>

                        <${Panel} title="Log">
                            <pre class="whitespace-pre-wrap break-words font-mono text-sm max-h-32 overflow-y-auto">${logs.join('\n')}</pre>
                        <//>
                    </div>

                    <!-- Right column: Transcriptions list -->
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-semibold text-lg">Transcriptions</h3>
                            <${Button} onClick=${fetchTranscriptions} variant="secondary">Refresh<//>
                        </div>

                        <div class="border border-gray-300 rounded-lg max-h-64 overflow-y-auto">
                            ${transcriptions.length === 0 ? html`
                                <div class="p-4 text-gray-500 text-center">No transcriptions</div>
                            ` : transcriptions.map(t => html`
                                <div
                                    key=${t.id}
                                    class="p-3 border-b border-gray-200 last:border-b-0 cursor-pointer hover:bg-gray-50 ${selectedTranscription?.id === t.id ? 'bg-blue-50' : ''}"
                                    onClick=${() => selectTranscription(t)}
                                >
                                    <div class="flex justify-between items-start">
                                        <div class="truncate flex-1 mr-2">
                                            <div class="font-mono text-xs text-gray-500">${t.id.substring(0, 8)}...</div>
                                            <div class="text-sm truncate">${t.filename || t.audio_url || 'Unknown source'}</div>
                                        </div>
                                        <span class="px-2 py-0.5 text-xs rounded-full ${
                                            t.status === 'completed' ? 'bg-green-100 text-green-700' :
                                            t.status === 'error' ? 'bg-red-100 text-red-700' :
                                            'bg-yellow-100 text-yellow-700'
                                        }">
                                            ${t.status}
                                        </span>
                                    </div>
                                </div>
                            `)}
                        </div>

                        ${selectedTranscription && html`
                            <${Panel} title="Selected Transcription">
                                <div class="space-y-2 text-sm">
                                    <div><strong>ID:</strong> <span class="font-mono">${selectedTranscription.id}</span></div>
                                    <div><strong>Status:</strong> ${selectedTranscription.status}</div>
                                    <div><strong>Model:</strong> ${selectedTranscription.model}</div>
                                    ${selectedTranscription.duration_ms && html`
                                        <div><strong>Duration:</strong> ${(selectedTranscription.duration_ms / 1000).toFixed(1)}s</div>
                                    `}
                                    ${selectedTranscription.enable_speaker_diarization && html`<div>✓ Speaker Diarization</div>`}
                                    ${selectedTranscription.enable_language_identification && html`<div>✓ Language ID</div>`}
                                    <div class="flex gap-2 pt-2">
                                        ${selectedTranscription.status !== 'completed' && html`
                                            <${Button} onClick=${() => waitForTranscription(selectedTranscription.id)} variant="secondary">
                                                Wait
                                            <//>
                                        `}
                                        ${selectedTranscription.status === 'completed' && html`
                                            <${Button} onClick=${() => viewTranscript(selectedTranscription.id)} variant="secondary">
                                                View Transcript
                                            <//>
                                        `}
                                        <${Button} onClick=${() => deleteTranscription(selectedTranscription.id)} variant="secondary">
                                            Delete
                                        <//>
                                    </div>
                                </div>
                            <//>
                        `}
                    </div>
                </div>

                ${transcript && html`
                    <${Panel} title="Transcript">
                        <div class="mb-3 p-3 bg-gray-50 rounded">
                            <div class="text-sm text-gray-500 mb-1">Full Text</div>
                            <div class="whitespace-pre-wrap">${transcript.text}</div>
                        </div>
                        <div class="text-sm text-gray-500 mb-2">Segments (${transcript.parsed?.length || 0})</div>
                        <div class="space-y-2 max-h-64 overflow-y-auto">
                            ${(transcript.parsed || []).map((seg, i) => html`
                                <div key=${i} class="p-2 bg-gray-100 rounded">
                                    <div class="text-xs text-gray-500 mb-1">
                                        ${[
                                            seg.speaker && `Speaker: ${seg.speaker}`,
                                            seg.language && `Lang: ${seg.language}`,
                                            (seg.start_ms !== undefined || seg.end_ms !== undefined) && `${formatTime(seg.start_ms)} - ${formatTime(seg.end_ms)}`
                                        ].filter(Boolean).join(' | ') || 'No metadata'}
                                    </div>
                                    <div>${seg.text}</div>
                                </div>
                            `)}
                        </div>
                    <//>
                `}
            `;
        }

        // ====================================================================
        // Main App
        // ====================================================================
        function App() {
            const [activeTab, setActiveTab] = useState('realtime');

            const tabs = [
                { id: 'realtime', label: 'Realtime' },
                { id: 'async', label: 'Async' },
                { id: 'agent', label: 'Voice Agent' },
            ];

            return html`
                <div class="max-w-4xl mx-auto p-6">
                    <h1 class="text-3xl font-bold">Soniox SDK Demo</h1>
                    <p class="text-gray-500 mt-1">Explore Soniox speech-to-text capabilities.</p>

                    <div class="flex mt-6 border-b-2 border-gray-300">
                        ${tabs.map(tab => html`
                            <button
                                key=${tab.id}
                                class="px-6 py-3 font-semibold -mb-0.5 border-b-2 transition-colors ${activeTab === tab.id ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent hover:text-gray-700'}"
                                onClick=${() => setActiveTab(tab.id)}
                            >
                                ${tab.label}
                            </button>
                        `)}
                    </div>

                    ${activeTab === 'realtime' && html`<${TranscriptionTab} />`}
                    ${activeTab === 'async' && html`<${AsyncTab} />`}
                    ${activeTab === 'agent' && html`<${AgentTab} />`}
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('app'));
    </script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div id="app"></div>
</body>
</html>
